name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flamedulacd-main
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: flamedulacd-main/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - name: Validate admin deployment contracts
        run: >-
          node -e "const fs=require('fs');const c=require('../vercel.json');
          const h=fs.readFileSync('../admflamedula-main/index.html','utf8');
          const cfg=fs.readFileSync('../admflamedula-main/assets/js/config.js','utf8');
          const router=fs.readFileSync('../admflamedula-main/assets/js/publication/publicationRouter.js','utf8');
          if(!c.redirects?.some(r=>r.source==='/admin'&&r.destination==='/admin/')
          ||!h.includes('frame-src https://upload-widget.cloudinary.com')
          ||!h.includes('script-src')||!h.includes('https://upload-widget.cloudinary.com')
          ||!cfg.includes('ENABLE_LEGACY_DIRECT_UPLOAD: true')
          ||!cfg.includes('OFFICIAL_WHATSAPP_URL')
          ||!cfg.includes('https://wa.me/558599280682')
          ||!router.includes('payload.cta_url = getOfficialWhatsAppUrl()'))
          process.exit(1)"
      - run: npm run build

  admin-and-database:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admflamedula-main
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admflamedula-main/package-lock.json
      - run: npm ci
      - run: npm audit
      - run: npm run test:migrations
      - name: Check browser JavaScript syntax
        shell: bash
        run: |
          find assets/js -type f -name '*.js' -print0 |
            xargs -0 -n1 node --check
